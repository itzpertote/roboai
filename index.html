<!DOCTYPE html>
<html lang="tr">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>Robo AI</title>

  <link rel="stylesheet" href="styles.css" />

</head>

<body>

  <!-- APP -->

  <div class="app-shell">

    <!-- SIDEBAR -->

    <aside class="sidebar">

      <div class="sidebar-top">

        <div class="brand-block">

          <h1 class="brand-title">
            Robo AI
          </h1>

          <p
            class="brand-subtitle"
            id="subtitle">

            robo-model-1.0-local active

          </p>

        </div>

        <!-- API STATUS -->

        <div
          class="api-pill"
          id="apiPill">

          Local

        </div>

      </div>

      <!-- MODEL PICKER -->

      <div
        class="model-picker"
        id="modelPicker">

        <!-- LOCAL -->

        <button
          type="button"
          class="model-card active"
          data-model="robo-1.0-local">

          <span class="model-name">
            robo-model-1.0-local
          </span>

          <span
            class="model-desc"
            data-tr="Yerel model • hızlı • çevrimdışı"
            data-en="Local model • fast • offline">

            Yerel model • hızlı • çevrimdışı

          </span>

        </button>

        <!-- MINI -->

        <button
          type="button"
          class="model-card locked"
          data-model="robo-1.1-mini"
          id="miniModelButton">

          <span class="model-name">
            robo-model-1.1-mini
          </span>

          <span
            class="model-desc lock-text"
            id="miniModelText"
            data-tr="Bu modeli kullanmak için giriş yapmalısın"
            data-en="You need to be logged in to use this model">

            Bu modeli kullanmak için giriş yapmalısın

          </span>

        </button>

      </div>

      <!-- LOGIN -->

      <div class="sidebar-bottom">

        <button
          type="button"
          class="login-button"
          id="loginButton">

          Login

        </button>

      </div>

    </aside>

    <!-- MAIN -->

    <main class="main-panel">

      <!-- CHAT -->

      <section
        class="chat-feed"
        id="chatFeed">

      </section>

      <!-- COMPOSER -->

      <footer class="composer-shell">

        <form
          class="composer"
          id="composer">

          <!-- INPUT -->

          <textarea
            id="textInput"
            name="message"
            rows="1"
            maxlength="1800"
            autocomplete="off"
            placeholder="Mesaj yaz..."></textarea>

          <!-- SEND -->

          <button
            class="send-button"
            id="sendButton"
            type="submit">

            Gönder

          </button>

        </form>

      </footer>

    </main>

  </div>

  <!-- LOGIN MODAL -->

  <div
    class="login-modal hidden"
    id="loginModal">

    <div class="login-card">

      <div class="login-header">

        <h2 id="loginTitle">
          Login
        </h2>

        <p id="loginSubtitle">
          robo-model-1.1-mini access
        </p>

      </div>

      <div class="login-body">

        <input
          type="text"
          id="usernameInput"
          autocomplete="username"
          placeholder="Username" />

        <input
          type="password"
          id="passwordInput"
          autocomplete="current-password"
          placeholder="Password" />

      </div>

      <div class="login-actions">

        <button
          type="button"
          id="loginSubmit">

          Login

        </button>

      </div>

    </div>

  </div>

  <!-- SCRIPT -->

  <script src="app.js"></script>

</body>
</html>
