<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>Robo AI</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- TOP BAR -->

  <header class="topbar">

    <div class="brand-area">

      <h1 class="brand-title">
        Robo AI
      </h1>

      <p
        class="brand-subtitle"
        id="subtitle">

        robo-model-1.0-local active

      </p>

    </div>

  </header>

  <!-- CHAT -->

  <main
    class="chat-feed"
    id="chatFeed">

    <!-- messages append here -->

  </main>

  <!-- COMPOSER -->

  <footer class="composer-shell">

    <form
      class="composer"
      id="composer">

      <!-- MODEL PICKER -->

      <div
        class="model-picker"
        id="modelPicker">

        <!-- LOCAL MODEL -->

        <button
          type="button"
          class="model-card active"
          data-model="robo-1.0-local">

          <span class="model-name">
            robo-model-1.0-local
          </span>

          <span
            class="model-desc"
            data-tr="Yerel model • hızlı • çevrimdışı"
            data-en="Local model • fast • offline">

            Yerel model • hızlı • çevrimdışı

          </span>

        </button>

        <!-- MINI MODEL -->

        <button
          type="button"
          class="model-card locked"
          data-model="robo-1.1-mini"
          id="miniModelButton">

          <span class="model-name">
            robo-model-1.1-mini
          </span>

          <span
            class="model-desc lock-text"
            id="miniModelText"
            data-tr="Bu modeli kullanmak için giriş yapmalısın"
            data-en="You need to be logged in to use this model">

            Bu modeli kullanmak için giriş yapmalısın

          </span>

        </button>

      </div>

      <!-- TEXT INPUT -->

      <div class="input-area">

        <textarea
          id="textInput"
          name="message"
          autocomplete="off"
          maxlength="1800"
          placeholder="Mesaj yaz..."
          rows="1"></textarea>

      </div>

      <!-- LOGIN BUTTON -->

      <button
        type="button"
        class="login-button"
        id="loginButton">

        Login

      </button>

      <!-- SEND BUTTON -->

      <button
        class="send-button"
        type="submit"
        id="sendButton">

        Gönder

      </button>

    </form>

  </footer>

  <!-- LOGIN MODAL -->

  <div
    class="login-modal hidden"
    id="loginModal">

    <div class="login-card">

      <div class="login-header">

        <h2 id="loginTitle">
          Login
        </h2>

        <p id="loginSubtitle">
          robo-model-1.1-mini access
        </p>

      </div>

      <div class="login-body">

        <input
          type="text"
          id="usernameInput"
          placeholder="Username"
          autocomplete="username" />

        <input
          type="password"
          id="passwordInput"
          placeholder="Password"
          autocomplete="current-password" />

      </div>

      <div class="login-actions">

        <button
          type="button"
          id="loginSubmit">

          Login

        </button>

      </div>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
